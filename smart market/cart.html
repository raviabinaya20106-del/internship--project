<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart E-Commerce | Cart System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand text-warning" href="index.html"><i class="fas fa-bolt me-2"></i>SmartMarket</a>
            <a href="index.html" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left"></i> Back to Shop</a>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="fw-bold mb-4"><i class="fas fa-shopping-basket text-primary me-2"></i>Your Basket Checkout Queue</h2>
        
        <div class="row g-4">
            <div class="col-lg-8" id="cart-items-container"></div>
            
            <div class="col-lg-4" id="cart-total-box">
                <div class="card p-4 border-0 shadow-sm rounded-4">
                    <h4 class="fw-bold mb-3">Order Summary</h4>
                    <div class="d-flex justify-content-between mb-2"><span>Subtotal</span><span id="subtotal-price" class="fw-bold">₹0</span></div>
                    <div class="d-flex justify-content-between mb-2"><span>Shipping Delivery</span><span class="text-success fw-bold">FREE</span></div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4"><strong>Total Amount</strong><strong id="final-price" class="fs-5 text-primary">₹0</strong></div>
                    <a href="checkout.html" class="btn btn-primary btn-lg w-100 btn-animated">Proceed to Payment Gateway</a>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
